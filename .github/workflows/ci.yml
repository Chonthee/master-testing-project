name: Python CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      docker:
        image: docker:dind
        options: --privileged

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install ruff pytest testcontainers sqlalchemy psycopg2-binary flask bandit safety schemathesis

    - name: Stage 1 - Code Quality & Security (Ruff)
      run: ruff check app.py

    - name: Stage 2 - Integration Tests (Testcontainers + Postgres)
      run: python -m pytest -v tests/

    - name: Stage 3 - API Fuzzing (Schemathesis)
      run: python -m pytest tests/test_api.py::test_api_fuzzing

    - name: Stage 4 - SAST Security Scan (Bandit)
      run: bandit app.py